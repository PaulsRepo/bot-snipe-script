on *:TEXT:*:#: {
  var %botname = Duckhunt
  var %reply   = !bang
  if ($nick == %botname) {
    if ($regex($1-,/(?:_O>|_O<|_o<|url > \*BANG\* You missed|url > *click* Your gun jammed|GOLDEN DUCK!)/i)) {
      var %delay = $rand(400,600)
      .timerAutoReply -m 1 %delay msg $chan %reply
    }
  }
}

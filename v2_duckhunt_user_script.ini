; DuckHunt User Auto-Shooter Script
; Manages inventory and shop purchases automatically

on *:TEXT:*:#: {
  ; Only run in these channels - edit as needed
  if ($chan != #url) { halt }
  
  var %botname = Quackbot
  var %mynick = $me
  
  if ($nick == %botname) {
    ; Duck appeared - shoot it
    if ($regex($1-,/(?:_O>|_O<|_o<|\\\_O<)/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Gun jammed - retry immediately
    else if ($regex($1-,/%mynick > \*click\* Your gun jammed/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Hit but duck still alive (HP remaining) - keep shooting
    else if ($regex($1-,/%mynick > \*BANG\* You shot.*\[(\d+) HP remaining\]/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Missed the duck (not friendly fire) - try again
    else if ($regex($1-,/%mynick > \*BANG\* You missed the duck/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Out of ammo - try to use magazine from inventory
    else if ($regex($1-,/%mynick > \*click\* You're out of ammo/i)) {
      var %delay = $rand(400,500)
      .timerTryUseMag -m 1 %delay msg $chan !use 2
    }
    
    ; Successfully reloaded - continue shooting
    else if ($regex($1-,/%mynick > \*click\* New magazine loaded/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Gun confiscated - try to use Buy Gun Back from inventory
    else if ($regex($1-,/%mynick >.*\[GUN CONFISCATED\]/i)) {
      var %delay = $rand(400,500)
      .timerTryUseBuyBack -m 1 %delay msg $chan !use 7
    }
    
    ; Gun was confiscated and we tried to shoot - use Buy Gun Back
    else if ($regex($1-,/%mynick > Your gun has been confiscated/i)) {
      var %delay = $rand(400,500)
      .timerTryUseBuyBack -m 1 %delay msg $chan !use 7
    }
    
    ; Successfully used Buy Gun Back - shoot if there's a duck
    else if ($regex($1-,/%mynick > Your gun has been returned/i)) {
      var %delay = $rand(400,500)
      .timerAutoShoot -m 1 %delay msg $chan !bang
    }
    
    ; Failed to use item (don't have it) - buy from shop
    else if ($regex($1-,/%mynick > You don't have that item/i)) {
      ; Check which item we just tried to use based on last timer
      if ($timer(TryUseMag)) {
        ; Tried to use magazine, buy it
        var %delay = $rand(400,500)
        .timerBuyMag -m 1 %delay msg $chan !shop buy 2
      }
      else if ($timer(TryUseBuyBack)) {
        ; Tried to use Buy Gun Back, buy it
        var %delay = $rand(400,500)
        .timerBuyBuyBack -m 1 %delay msg $chan !shop buy 7
      }
    }
    
    ; Successfully bought Buy Gun Back - use it
    else if ($regex($1-,/%mynick > You bought Buy Gun Back/i)) {
      var %delay = $rand(400,500)
      .timerUseBuyBack -m 1 %delay msg $chan !use 7
    }
    
    ; Successfully bought Magazine - use it then reload
    else if ($regex($1-,/%mynick > You bought Magazine/i)) {
      var %delay = $rand(400,500)
      .timerUseMag -m 1 %delay msg $chan !use 2
    }
    
    ; Successfully bought Single Bullet - use it then reload
    else if ($regex($1-,/%mynick > You bought Single Bullet/i)) {
      var %delay = $rand(400,500)
      .timerUseBullet -m 1 %delay msg $chan !use 1
    }
    
    ; After using magazine/bullet - reload
    else if ($regex($1-,/%mynick > Successfully used Magazine|%mynick > Successfully used Single Bullet/i)) {
      var %delay = $rand(400,500)
      .timerAutoReload -m 1 %delay msg $chan !reload
    }
    
    ; Out of magazines - need to buy one
    else if ($regex($1-,/%mynick > You're out of ammo!/i)) {
      var %delay = $rand(400,500)
      .timerBuyMag -m 1 %delay msg $chan !shop buy 2
    }
    
    ; Not enough XP to buy - just wait for next duck
    else if ($regex($1-,/%mynick > You don't have enough XP/i)) {
      ; Do nothing, we're broke
      halt
    }
  }
}
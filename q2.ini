on *:TEXT:*:#: {
  var %botname = Quackbot
  if ($nick != %botname) return

  var %t = $replace($1-,&lt;,<,&gt;,>)

  if (*url > *BANG* You shot the duck!* iswm %t) return
  if (*url > *BANG* You killed the GOLDEN DUCK!* iswm %t) return
  if ($regex(%t,/url > \*click\* Your gun jammed/i)) { .msg $chan !reload | .timer -m 1 120 .msg $chan !bang | return }
  if ($regex(%t,/url > \*BANG\* You missed/i)) { .msg $chan !bang | return }
  if ($regex(%t,/url > \*BANG\* You shot a GOLDEN DUCK!/i)) { .msg $chan !bang | return }
  if ($regex(%t,/url > \*BANG\* What did you shoot at\? There is no duck in the area\.\.\. \[GUN CONFISCATED\]/i)) { .msg $chan $+(!rearm , $me) | return }

  if ($regex(%t,/(?:QUACK!|(?:\\)?(?:_?[oOxX])(?:<|>))/i)) { .msg $chan !bang | return }
}

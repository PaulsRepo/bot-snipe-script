# DuckHunt Bot Configuration

[IRC]
server = irc.rizon.net
port = 6667
channel = #url
nickname = url
# password =  # Uncomment and add your NickServ password if needed

[Bot_Behavior]
# Minimum delay between shots (seconds)
min_bang_delay = 0.8

# Delay after duck spawn before first shot (seconds)
spawn_reaction_delay = 0.3

# Delay between consecutive shots on golden ducks (seconds)
golden_duck_shot_delay = 0.85

# Enable automatic magazine usage from inventory
auto_use_magazines = true

# Enable automatic reloading when out of ammo
auto_reload = true

[Advanced]
# Maximum HP to assume for golden ducks (if HP not detected)
default_golden_hp = 3

# Enable verbose logging
verbose = true

# Reconnect on disconnect
auto_reconnect = true

# Reconnect delay (seconds)
reconnect_delay = 5
